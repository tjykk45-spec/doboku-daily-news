name: Daily News

on:
  schedule:
    # 平日 9:00 JST (= 0:00 UTC)
    - cron: '0 0 * * 1-5'
  workflow_dispatch:  # 手動実行ボタン

permissions:
  contents: write  # main への push に必要

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ① RSS フィード → scripts/watchlist.txt を生成
      - name: Fetch RSS → watchlist
        run: python scripts/fetch_rss.py

      # ② watchlist の全 URL を Gemini で要約 → clips/data/*.json
      - name: Ingest all articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/daily_run.py --ingest-all

      # ③ clips/data/*.json → index.html を再生成
      - name: Render index.html
        run: python scripts/render_html.py

      # ④ 生成ファイルを main に push → GitHub Pages が自動更新
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clips/data/ clips/log/ index.html
          git diff --staged --quiet && echo "変更なし、コミットをスキップ" || \
            git commit -m "chore: daily news $(date +'%Y-%m-%d')" && git push
